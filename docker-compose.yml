services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: kuva-catalog-pricing-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_password123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_catalog_pricing_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_strong_password123 -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kuva-catalog-pricing-service:
    build:
      context: .
      dockerfile: Source/Kuva.CatalogPricing.Service/Dockerfile
    container_name: kuva-catalog-pricing-service
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__CatalogPricingDatabase: "Server=sqlserver,1433;Database=KuvaCatalogPricing;User Id=sa;Password=Your_strong_password123;TrustServerCertificate=True"
      Jwt__Issuer: "kuva-auth"
      Jwt__Audience: "kuva-apis"
      CatalogPricing__DefaultCurrency: "BRL"
    ports:
      - "8083:8080"

  prometheus:
    image: prom/prometheus:latest
    container_name: kuva-catalog-pricing-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"
    depends_on:
      - kuva-catalog-pricing-service

  grafana:
    image: grafana/grafana:latest
    container_name: kuva-catalog-pricing-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_catalog_pricing_data:/var/lib/grafana

volumes:
  sqlserver_catalog_pricing_data:
  grafana_catalog_pricing_data:
